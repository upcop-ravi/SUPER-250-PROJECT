<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Calculator App</title>
    <link rel="stylesheet" href="TASKCALC.CSS">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2574/2574760.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://upcop-ravi.github.io/SUPER-250-PROJECT/HTML/TASKCALC/TASKCALC.HTML">
    <meta property="og:title" content="Created by - Ravi Yadav | Multi-Calculator App | All-in-One Math Tools">
    <meta property="og:description"
        content="Access Math, Scientific, Fraction, and Triangle calculators all in one split-screen application.">
    <meta property="og:image" content="https://www.pngarts.com/files/1/Calculator-PNG-Download-Image.png">
</head>

<body>

    <div class="container">
        <!-- Left Side: Controls -->
        <aside class="sidebar">
            <h2>Select-Calculator</h2>
            <form id="calc-menu">
                <!-- New Grouping Div -->
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="math" checked> Arithmetic Calculator
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="scientific"> Scientific Calculator
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="triangle"> Triangle Calculator
                    </label>
                    <!--<label class="radio-item">
                        <input type="radio" name="calc-option" value="fraction"> Fraction Calculator
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="percentage"> Percentage Calculator
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="random"> Random Number Generator
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="calc-option" value="std_dev"> Standard Deviation Calculator
                    </label> -->
                    <!-- Inside the <main class="output-panel" id="display-area"> -->
                    <main class="output-panel" id="display-area">
                        <div id="output-content">
                            <!-- Default Welcome Message -->
                            <div id="welcome-screen">
                                <h1>Welcome</h1>
                                <p>Select an option on the left to start calculating.</p>
                            </div>

                            <!-- Scientific Calculator UI (Hidden by default) -->
                            <div id="scientific-ui" style="display: none;">
                                <div class="sci-calculator">
                                    <div class="sci-display" id="sci-display">0</div>
                                    <div class="sci-grid">
                                        <button class="btn-func" onclick="handleSci('inv')">Inv</button>
                                        <button class="btn-func" onclick="handleSci('deg')">Deg</button>
                                        <button class="btn-func" onclick="appendSci('!')">x!</button>
                                        <button class="btn-func" onclick="appendSci('(')">(</button>
                                        <button class="btn-func" onclick="appendSci(')')">)</button>
                                        <button class="btn-func" onclick="clearSci()">C</button>
                                        <button class="btn-func" onclick="backSci()">⌫</button>

                                        <!-- Row 2 -->
                                        <button class="btn-func" onclick="handleSci('ln')">ln</button>
                                        <button class="btn-func" onclick="handleSci('sin')">sin</button>
                                        <button class="btn-func" onclick="appendSci('%')">%</button>
                                        <button class="btn-num" onclick="appendSci('7')">7</button>
                                        <button class="btn-num" onclick="appendSci('8')">8</button>
                                        <button class="btn-num" onclick="appendSci('9')">9</button>
                                        <button class="btn-func" onclick="appendSci('/')">÷</button>

                                        <!-- Add remaining rows here following the same pattern -->
                                        <button class="btn-func" onclick="handleSci('log')">log</button>
                                        <button class="btn-func" onclick="handleSci('cos')">cos</button>
                                        <button class="btn-func" onclick="handleSci('sqrt')">√</button>
                                        <button class="btn-num" onclick="appendSci('4')">4</button>
                                        <button class="btn-num" onclick="appendSci('5')">5</button>
                                        <button class="btn-num" onclick="appendSci('6')">6</button>
                                        <button class="btn-func" onclick="appendSci('*')">×</button>

                                        <button class="btn-func" onclick="appendSci('^')">^</button>
                                        <button class="btn-func" onclick="handleSci('tan')">tan</button>
                                        <button class="btn-func" onclick="handleSci('invX')">1/x</button>
                                        <button class="btn-num" onclick="appendSci('1')">1</button>
                                        <button class="btn-num" onclick="appendSci('2')">2</button>
                                        <button class="btn-num" onclick="appendSci('3')">3</button>
                                        <button class="btn-func" onclick="appendSci('-')">-</button>

                                        <button class="btn-func" onclick="handleSci('exp')">Exp</button>
                                        <button class="btn-func" onclick="appendSci('Math.PI')">π</button>
                                        <button class="btn-func" onclick="appendSci('Math.E')">e</button>
                                        <button class="btn-num" onclick="appendSci('0')">0</button>
                                        <button class="btn-num" onclick="appendSci('.')">.</button>
                                        <button class="btn-eq" onclick="calculateSci()">=</button>
                                        <button class="btn-func" onclick="appendSci('+')">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>


                </div>
            </form>
        </aside>


        <!-- Right Side: Display -->
        <main class="output-panel" id="display-area">
            <div id="output-content">
                <h1>Welcome</h1>
                <p>Select an option on the left to start calculating.</p>
            </div>
        </main>
    </div>

    <script src="TASKCALC.JS"></script>
</body>

</html>
