<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Search Portal</title>
    <link rel="stylesheet" href="SEARCH.CSS">
</head>

<body>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="search-container">
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="category" value="Sheet1" checked> Banks
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="category" value="Sheet2"> TPAP
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="category" value="Sheet3"> Wallet & PPI
                    </label>
                </div>

                <label class="search-label" for="keyword">Search Bank Nodal Email</label>
                <input type="text" id="keyword" placeholder="Enter keyword...">
                <button id="searchBtn">Search</button>
            </div>
        </div>

        <div class="right-panel">
            <h2>SEARCH RESULTS</h2>
            <div id="cardContainer" class="card-container">
                <p style="color: #70757a; text-align: center;">Results will appear here...</p>
            </div>
        </div>
    </div>

    <script src="SEARCH.JS"></script>
</body>

</html>
