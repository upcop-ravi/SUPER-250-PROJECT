<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Nodal Search</title>
    <style>
        /* Shared Layout */
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100%;
        }

        /* LEFT SIDE: Input Area */
        .left-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #ddd;
            background-color: #f9f9f9;
        }

        .search-container {
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        label {
            font-size: 18px;
            color: #333;
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 250px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            background-color: #0078d7;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005ea3;
        }

        /* RIGHT SIDE: Dynamic Results Area */
        .right-panel {
            flex: 1;
            padding: 40px;
            background-color: #ffffff;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #0078d7;
            padding-bottom: 10px;
            text-align: center;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* Card Styles from CODE-02 */
        .card {
            background: white;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #eee;
            transition: transform 0.2s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .bank-name {
            font-size: 16px;
            font-weight: bold;
            color: #0078d7;
        }

        .email {
            color: #555;
            margin-top: 8px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .no-results {
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="left-panel">
            <div class="search-container">
                <label for="keyword">Search Nodal Contact Details</label>
                <input type="text" id="keyword" placeholder="Enter Bank Name...">
                <br>
                <button id="searchBtn">Search Database</button>
            </div>
        </div>

        <div class="right-panel">
            <h2>SEARCH RESULTS</h2>
            <div id="cardContainer" class="card-container">
                <p class="no-results">Results will appear here after searching...</p>
            </div>
        </div>
    </div>

    <script>
        const sheetID = "1VPD21zY1KbFAC9-OOdGKndZBy_YhYUMH7dbNm3U06Q4";
        const sheetName = "Sheet1";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${sheetName}`;

        const searchBtn = document.getElementById('searchBtn');
        const keywordInput = document.getElementById('keyword');
        const container = document.getElementById('cardContainer');

        searchBtn.addEventListener('click', () => {
            const filter = keywordInput.value.toLowerCase().trim();
            container.innerHTML = "<p>Loading data...</p>";

            fetch(url)
                .then(res => res.text())
                .then(data => {
                    // Extract JSON from Google's response wrapper
                    const json = JSON.parse(data.substr(47).slice(0, -2));
                    const rows = json.table.rows;

                    container.innerHTML = ""; // Clear loader

                    let foundMatch = false;

                    rows.forEach(row => {
                        const bankName = row.c[0] ? row.c[0].v : "N/A";
                        const email = row.c[1] ? row.c[1].v : "N/A";

                        // Filter Logic: If input matches bank name or if input is empty
                        if (bankName.toLowerCase().includes(filter) || filter === "") {
                            foundMatch = true;
                            const card = document.createElement("div");
                            card.className = "card";
                            card.innerHTML = `
                                <div class="bank-name">${bankName}</div>
                                <div class="email">${email}</div>
                            `;
                            container.appendChild(card);
                        }
                    });

                    if (!foundMatch) {
                        container.innerHTML = `<p class="no-results">No banks found matching "${filter}"</p>`;
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    container.innerHTML = "<p style='color:red;'>Error fetching data from Google Sheets.</p>";
                });
        });
    </script>

</body>

</html>
