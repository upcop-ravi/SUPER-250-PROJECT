<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Starter Page</title>
</head>

<body>

    <header>
        <h1>Welcome to My HTML5 Site</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home">
            <h2>The Power of HTML5</h2>
            <p>HTML5 introduced modern semantic tags like <code>&lt;header&gt;</code>, <code>&lt;nav&gt;</code>, and
                <code>&lt;main&gt;</code> to make code more readable.</p>
        </section>

        <article>
            <h3>Quick Tip</h3>
            <p>HTML5 allows you to play video and audio natively without extra plugins!</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 My Basic Website</p>
    </footer>

</body>

</html>
