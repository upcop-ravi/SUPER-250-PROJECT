<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Scientific Glass Calculator</title>
    <link rel="stylesheet" href="SC-CALC.CSS">
</head>

<body>
    <main class="app-container">
        <section class="calculator-card">
            <header class="calc-header">
                <input type="text" id="display" class="calc-display" placeholder="0" readonly>
            </header>

            <div class="calc-grid">
                <!-- Scientific Row -->
                <button class="btn btn-sci" onclick="sciFunction('sin')">sin</button>
                <button class="btn btn-sci" onclick="sciFunction('cos')">cos</button>
                <button class="btn btn-sci" onclick="sciFunction('tan')">tan</button>
                <button class="btn btn-sci" onclick="sciFunction('log')">log</button>

                <!-- Row 1 -->
                <button class="btn btn-action" onclick="clearDisplay()">AC</button>
                <button class="btn btn-action" onclick="deleteLast()">DEL</button>
                <button class="btn btn-sci" onclick="sciFunction('sqrt')">√</button>
                <button class="btn btn-operator" onclick="appendToDisplay('/')">÷</button>

                <!-- Row 2 -->
                <button class="btn" onclick="appendToDisplay('7')">7</button>
                <button class="btn" onclick="appendToDisplay('8')">8</button>
                <button class="btn" onclick="appendToDisplay('9')">9</button>
                <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>

                <!-- Row 3 -->
                <button class="btn" onclick="appendToDisplay('4')">4</button>
                <button class="btn" onclick="appendToDisplay('5')">5</button>
                <button class="btn" onclick="appendToDisplay('6')">6</button>
                <button class="btn btn-operator" onclick="appendToDisplay('-')">−</button>

                <!-- Row 4 -->
                <button class="btn" onclick="appendToDisplay('1')">1</button>
                <button class="btn" onclick="appendToDisplay('2')">2</button>
                <button class="btn" onclick="appendToDisplay('3')">3</button>
                <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>

                <!-- Row 5 -->
                <button class="btn" onclick="sciFunction('pi')">π</button>
                <button class="btn" onclick="appendToDisplay('0')">0</button>
                <button class="btn" onclick="appendToDisplay('.')">.</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>
            </div>
        </section>
    </main>
    <script src="SC-CALC.JS"></script>
</body>

</html>
